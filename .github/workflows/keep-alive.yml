# Pings Vercel, Render, and Supabase on a schedule so free-tier services
# don't spin down or pause from inactivity.
#
# Optional repo variables (Settings → Secrets and variables → Actions → Variables):
#   VERCEL_APP_URL        default: https://linksavekren.vercel.app
#   RENDER_API_URL        default: https://linksavekren-api.onrender.com
#   SUPABASE_PROJECT_URL  e.g. https://YOUR_PROJECT.supabase.co

name: Keep services alive

on:
  schedule:
    # Render free tier sleeps after ~15 minutes without traffic
    - cron: "*/14 * * * *"
    # Supabase free tier pauses after ~7 days without activity
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: keep-alive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      VERCEL_APP_URL: ${{ vars.VERCEL_APP_URL }}
      RENDER_API_URL: ${{ vars.RENDER_API_URL }}
      SUPABASE_PROJECT_URL: ${{ vars.SUPABASE_PROJECT_URL }}
    steps:
      - name: Ping Vercel (frontend + Supabase via DB)
        run: |
          URL="${VERCEL_APP_URL:-https://linksavekren.vercel.app}"
          echo "Pinging ${URL}/api/health"
          curl -fsS --retry 2 --retry-delay 5 --max-time 45 \
            "${URL}/api/health"

      - name: Ping Render (backend + Supabase via DB)
        run: |
          URL="${RENDER_API_URL:-https://linksavekren-api.onrender.com}"
          echo "Pinging ${URL}/health"
          curl -fsS --retry 2 --retry-delay 10 --max-time 120 \
            "${URL}/health"

      - name: Ping Supabase project
        run: |
          if [ -z "${SUPABASE_PROJECT_URL}" ]; then
            echo "SUPABASE_PROJECT_URL not set — skipping direct Supabase ping."
            echo "DB activity from Vercel/Render health checks still counts."
            exit 0
          fi
          echo "Pinging ${SUPABASE_PROJECT_URL}/auth/v1/health"
          curl -fsS --retry 2 --retry-delay 5 --max-time 30 \
            "${SUPABASE_PROJECT_URL}/auth/v1/health"
