services:
  - type: web
    name: memory404-api
    runtime: node
    plan: free          # upgrade to 'starter' for always-on (no spin-down)
    region: singapore
    # Install both packages because backend imports shared modules from root lib/.
    buildCommand: npm install && npm install --prefix backend && npm run build --prefix backend
    startCommand: npm start --prefix backend
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 4000

      # ── MongoDB Atlas ─────────────────────────────────────────────────────────
      - key: MONGODB_URI
        sync: false

      - key: MONGODB_DB
        value: memory404

      # ── CORS ─────────────────────────────────────────────────────────────────
      - key: CORS_ORIGINS
        value: https://memory404.vercel.app

      # ── Cloudinary (image storage for link previews) ──────────────────────────
      - key: CLOUDINARY_CLOUD_NAME
        sync: false   # set in Render dashboard

      - key: CLOUDINARY_API_KEY
        sync: false   # set in Render dashboard

      - key: CLOUDINARY_API_SECRET
        sync: false   # set in Render dashboard
